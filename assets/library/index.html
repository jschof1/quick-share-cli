<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Share Library</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111111;
        --panel: #191919;
        --panel-2: #242424;
        --border: #333333;
        --text: #f4f4f4;
        --muted: #a3a3a3;
        --accent: #f59e0b;
        --accent-2: #38bdf8;
        --danger: #f87171;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      header {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 20px;
        align-items: end;
        border-bottom: 1px solid var(--border);
        padding-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 4.4rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 12px 0 0;
        color: var(--muted);
        max-width: 680px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(110px, 1fr));
        gap: 10px;
      }

      .stat {
        min-height: 74px;
        border: 1px solid var(--border);
        background: var(--panel);
        padding: 12px;
      }

      .stat-value {
        color: var(--accent);
        font-size: 1.4rem;
        font-weight: 750;
      }

      .stat-label {
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) 160px 150px auto;
        gap: 10px;
        align-items: center;
        margin: 22px 0;
      }

      .field,
      .button {
        height: 42px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        border-radius: 6px;
      }

      .field {
        width: 100%;
        padding: 0 12px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 14px;
        cursor: pointer;
      }

      .button:hover,
      .file-action:hover {
        border-color: var(--accent);
      }

      .status {
        min-height: 22px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(238px, 1fr));
        gap: 14px;
        margin-top: 16px;
      }

      .file-card {
        min-width: 0;
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 8px;
        overflow: hidden;
      }

      .file-preview {
        position: relative;
        aspect-ratio: 4 / 3;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--panel-2);
        overflow: hidden;
      }

      .file-preview img,
      .file-preview video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .icon {
        font-size: 3.1rem;
      }

      .badge {
        position: absolute;
        left: 10px;
        top: 10px;
        padding: 4px 7px;
        background: rgba(17, 17, 17, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        font-size: 0.72rem;
        color: var(--muted);
      }

      .file-info {
        padding: 12px;
      }

      .file-name {
        min-height: 40px;
        font-weight: 650;
        overflow-wrap: anywhere;
      }

      .file-meta {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .file-actions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 12px;
      }

      .file-action {
        height: 34px;
        border: 1px solid var(--border);
        background: #151515;
        color: var(--text);
        border-radius: 6px;
        cursor: pointer;
      }

      .empty,
      .error,
      .loading {
        grid-column: 1 / -1;
        border: 1px solid var(--border);
        background: var(--panel);
        padding: 28px;
        color: var(--muted);
        border-radius: 8px;
      }

      .error {
        color: var(--danger);
      }

      footer {
        margin-top: 32px;
        color: var(--muted);
        font-size: 0.84rem;
      }

      a {
        color: var(--accent-2);
      }

      @media (max-width: 780px) {
        header,
        .toolbar {
          grid-template-columns: 1fr;
        }

        .stats {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      @media (max-width: 520px) {
        .shell {
          width: min(100% - 20px, 1180px);
          padding-top: 18px;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <h1>Quick Share Library</h1>
          <p class="subtitle">
            A browsable public asset shelf for files stored in Cloudflare R2.
          </p>
        </div>

        <section class="stats" aria-label="Library stats">
          <div class="stat">
            <div class="stat-value" id="fileCount">-</div>
            <div class="stat-label">Visible files</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="totalSize">-</div>
            <div class="stat-label">Visible size</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="imageCount">-</div>
            <div class="stat-label">Images</div>
          </div>
        </section>
      </header>

      <section class="toolbar" aria-label="Library controls">
        <input
          class="field"
          id="search"
          type="search"
          placeholder="Search files..."
          autocomplete="off"
        />
        <select class="field" id="typeFilter" aria-label="Filter by file type">
          <option value="all">All types</option>
          <option value="image">Images</option>
          <option value="video">Videos</option>
          <option value="document">Documents</option>
          <option value="archive">Archives</option>
        </select>
        <select class="field" id="sortBy" aria-label="Sort files">
          <option value="newest">Newest first</option>
          <option value="name">Name A-Z</option>
          <option value="largest">Largest first</option>
          <option value="smallest">Smallest first</option>
        </select>
        <button class="button" id="refresh" type="button">Refresh</button>
      </section>

      <div class="status" id="status">Loading files...</div>
      <section class="grid" id="files" aria-live="polite">
        <div class="loading">Loading files...</div>
      </section>

      <footer>
        Powered by Cloudflare R2. Configure with
        <code>?worker=https://worker.example.com/files&amp;public=https://pub.example.r2.dev</code>.
      </footer>
    </main>

    <script>
      const DEFAULT_WORKER_URL = "";
      const DEFAULT_PUBLIC_URL = "";

      const params = new URLSearchParams(window.location.search);
      const config = {
        workerUrl: params.get("worker") || DEFAULT_WORKER_URL,
        publicUrl: trimSlash(params.get("public") || DEFAULT_PUBLIC_URL),
        prefix: params.get("prefix") || "",
      };

      const state = {
        files: [],
        filtered: [],
        copiedUrl: "",
      };

      const els = {
        files: document.getElementById("files"),
        status: document.getElementById("status"),
        search: document.getElementById("search"),
        typeFilter: document.getElementById("typeFilter"),
        sortBy: document.getElementById("sortBy"),
        refresh: document.getElementById("refresh"),
        fileCount: document.getElementById("fileCount"),
        totalSize: document.getElementById("totalSize"),
        imageCount: document.getElementById("imageCount"),
      };

      const FILE_ICONS = {
        image: "IMG",
        video: "VID",
        audio: "AUD",
        document: "DOC",
        archive: "ZIP",
        other: "FILE",
      };

      function trimSlash(value) {
        return value.replace(/\/+$/, "");
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatSize(bytes) {
        if (!Number.isFinite(bytes) || bytes <= 0) return "-";
        const units = ["B", "KB", "MB", "GB", "TB"];
        let value = bytes;
        let index = 0;
        while (value >= 1024 && index < units.length - 1) {
          value /= 1024;
          index += 1;
        }
        return `${value.toFixed(value >= 10 || index === 0 ? 0 : 1)} ${units[index]}`;
      }

      function getExtension(filename) {
        return filename.includes(".")
          ? filename.split(".").pop().toLowerCase()
          : "";
      }

      function getType(file) {
        const mimeType = file.mimeType || "";
        const ext = getExtension(file.name);
        if (mimeType.startsWith("image/") || ["jpg", "jpeg", "png", "gif", "webp", "svg", "avif"].includes(ext)) return "image";
        if (mimeType.startsWith("video/") || ["mp4", "mov", "webm"].includes(ext)) return "video";
        if (mimeType.startsWith("audio/") || ["mp3", "wav", "m4a"].includes(ext)) return "audio";
        if (mimeType === "application/zip" || ["zip", "rar", "7z"].includes(ext)) return "archive";
        if (["pdf", "doc", "docx", "txt", "csv", "xls", "xlsx"].includes(ext)) return "document";
        return "other";
      }

      function fileUrl(file) {
        if (file.url) return file.url;
        if (!config.publicUrl) return "";
        return `${config.publicUrl}/${file.name.split("/").map(encodeURIComponent).join("/")}`;
      }

      async function loadFiles() {
        if (!config.workerUrl) {
          renderConfigNeeded();
          return;
        }

        els.status.textContent = "Loading files...";
        els.files.innerHTML = '<div class="loading">Loading files...</div>';

        try {
          const url = new URL(config.workerUrl);
          if (config.prefix) url.searchParams.set("prefix", config.prefix);
          url.searchParams.set("limit", "1000");

          const res = await fetch(url);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || `Worker returned ${res.status}`);

          state.files = Array.isArray(data.files) ? data.files : [];
          applyFilters();
          els.status.textContent = data.truncated
            ? "Showing first 1000 files. Narrow with a prefix for large buckets."
            : `Loaded ${state.files.length} files.`;
        } catch (error) {
          els.files.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
          els.status.textContent = "Unable to load the library.";
          updateStats([]);
        }
      }

      function renderConfigNeeded() {
        els.files.innerHTML = `
          <div class="empty">
            Add a worker URL to load this library. Example:
            <br />
            <code>?worker=https://quick-share-api.example.workers.dev/files&amp;public=https://pub-example.r2.dev</code>
          </div>
        `;
        els.status.textContent = "Worker URL not configured.";
        updateStats([]);
      }

      function applyFilters() {
        const query = els.search.value.trim().toLowerCase();
        const type = els.typeFilter.value;
        const sort = els.sortBy.value;

        state.filtered = state.files.filter((file) => {
          const matchesQuery = !query || file.name.toLowerCase().includes(query);
          const fileType = getType(file);
          const matchesType = type === "all" || fileType === type;
          return matchesQuery && matchesType;
        });

        state.filtered.sort((a, b) => {
          if (sort === "name") return a.name.localeCompare(b.name);
          if (sort === "largest") return (b.size || 0) - (a.size || 0);
          if (sort === "smallest") return (a.size || 0) - (b.size || 0);
          return new Date(b.uploadedAt || 0) - new Date(a.uploadedAt || 0);
        });

        renderFiles();
      }

      function renderFiles() {
        updateStats(state.filtered);

        if (state.filtered.length === 0) {
          els.files.innerHTML = '<div class="empty">No files match the current filters.</div>';
          return;
        }

        els.files.innerHTML = state.filtered.map(renderFile).join("");
      }

      function renderFile(file) {
        const type = getType(file);
        const url = fileUrl(file);
        const safeName = escapeHtml(file.name);
        const uploadedAt = file.uploadedAt
          ? new Date(file.uploadedAt).toLocaleDateString()
          : "";
        const preview =
          type === "image" && url
            ? `<img src="${escapeHtml(url)}" alt="${safeName}" loading="lazy" onerror="this.replaceWith(document.createTextNode('${FILE_ICONS[type]}'))" />`
            : `<span class="icon">${FILE_ICONS[type] || FILE_ICONS.other}</span>`;

        return `
          <article class="file-card">
            <div class="file-preview">
              <span class="badge">${escapeHtml(type)}</span>
              ${preview}
            </div>
            <div class="file-info">
              <div class="file-name" title="${safeName}">${safeName}</div>
              <div class="file-meta">
                <span>${formatSize(file.size)}</span>
                <span>${escapeHtml(uploadedAt)}</span>
              </div>
              <div class="file-actions">
                <button class="file-action" type="button" onclick="openFile('${escapeJs(url)}')">Open</button>
                <button class="file-action" type="button" onclick="copyFile('${escapeJs(url)}')">Copy</button>
                <button class="file-action" type="button" onclick="downloadFile('${escapeJs(url)}')">Save</button>
              </div>
            </div>
          </article>
        `;
      }

      function escapeJs(value) {
        return String(value || "").replaceAll("\\", "\\\\").replaceAll("'", "\\'");
      }

      function updateStats(files) {
        const totalSize = files.reduce((sum, file) => sum + (file.size || 0), 0);
        const images = files.filter((file) => getType(file) === "image").length;
        els.fileCount.textContent = String(files.length);
        els.totalSize.textContent = formatSize(totalSize);
        els.imageCount.textContent = String(images);
      }

      function openFile(url) {
        if (!url) return;
        window.open(url, "_blank", "noopener,noreferrer");
      }

      async function copyFile(url) {
        if (!url) return;
        await navigator.clipboard.writeText(url);
        state.copiedUrl = url;
        els.status.textContent = "Copied public URL.";
      }

      function downloadFile(url) {
        if (!url) return;
        const a = document.createElement("a");
        a.href = url;
        a.download = "";
        document.body.appendChild(a);
        a.click();
        a.remove();
      }

      els.search.addEventListener("input", applyFilters);
      els.typeFilter.addEventListener("change", applyFilters);
      els.sortBy.addEventListener("change", applyFilters);
      els.refresh.addEventListener("click", loadFiles);

      loadFiles();
    </script>
  </body>
</html>
